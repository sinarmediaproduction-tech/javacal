<body>

    <div class="calendar-wrapper" id="calendarWrapper"></div>

    <!-- Modal Pilih Tanggal -->
    <div class="date-picker-modal" id="datePickerModal">
        <div class="date-picker-box">
            <h3>Pilih Tanggal</h3>
            <input type="date" id="datePickerInput">
            <div class="btn-group">

                <button class="btn-cancel" onclick="closeDatePicker()">Batal</button>
            </div>

    <script>
        // --- DATA NEPTU ---
        const nilaiHari = {
            0: 5, // Minggu
            1: 4, // Senin
            2: 3, // Selasa
            3: 7, // Rabu
            4: 8, // Kamis
            5: 6, // Jumat
            6: 9 // Sabtu
        };
        const nilaiPasaran = {
            'Wage': 4,
            'Kliwon': 8,
            'Legi': 5,
            'Pahing': 9,
            'Pon': 7
        };

        function getNeptu(dayIndex, pasaranName) {
            return nilaiHari[dayIndex] + nilaiPasaran[pasaranName];
        }

        // --- FUNGSI PANCASUDA ---
        function getPancasuda(neptu) {
            const sisa = neptu % 5;
            let nama, keterangan, isGood;
            switch (sisa) {
                case 1:
                    nama = "Sri";
                    keterangan = "Kelimpahan rezeki";
                    isGood = true;
                    break;
                case 2:
                    nama = "Lungguh";
                    keterangan = "Kehormatan & wibawa";
                    isGood = true;
                    break;
                case 3:
                    nama = "Gedhong";
                    keterangan = "Kekayaan harta";
                    isGood = true;
                    break;
                case 4:
                    nama = "Lara";
                    keterangan = "Penyakit / kesialan";
                    isGood = false;
                    break;
                case 0:
                    nama = "Pati";
                    keterangan = "Musibah / kematian";
                    isGood = false;
                    break;
                default:
                    nama = "-";
                    keterangan = "-";
                    isGood = false;
            }
            return { sisa, nama, keterangan, isGood };
        }

        const namaBulan = ["JANUARI", "FEBRUARI", "MARET", "APRIL", "MEI", "JUNI", "JULI", "AGUSTUS", "SEPTEMBER", "OKTOBER", "NOVEMBER",
            "DESEMBER"
        ];
        const hari = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
        const pasaran = ['Wage', 'Kliwon', 'Legi', 'Pahing', 'Pon'];

        const daftarWuku = [
            { no: 1, name: "Sinta" }, { no: 2, name: "Landhep" }, { no: 3, name: "Wukir" },
            { no: 4, name: "Kurantil" }, { no: 5, name: "Tolu" }, { no: 6, name: "Gumbreg" },
            { no: 7, name: "Warigalit" }, { no: 8, name: "Warigagung" }, { no: 9, name: "Julungwangi" },
            { no: 10, name: "Sungsang" }, { no: 11, name: "Galungan" }, { no: 12, name: "Kuningan" },
            { no: 13, name: "Langkir" }, { no: 14, name: "Mandasiya" }, { no: 15, name: "Julungpujud" },
            { no: 16, name: "Pahang" }, { no: 17, name: "Kuruwelut" }, { no: 18, name: "Marakeh" },
            { no: 19, name: "Tambir" }, { no: 20, name: "Medangkungan" }, { no: 21, name: "Maktal" },
            { no: 22, name: "Wuye" }, { no: 23, name: "Manahil" }, { no: 24, name: "Prangbakat" },
            { no: 25, name: "Bala" }, { no: 26, name: "Wugu" }, { no: 27, name: "Wayang" },
            { no: 28, name: "Kulawu" }, { no: 29, name: "Dukut" }, { no: 30, name: "Watugunung" }
        ];

        const namaTahunJawa = ["Alip", "Ehe", "Jimawal", "Je", "Dal", "Be", "Wawu", "Jimakir"];
        const namaBulanSaka = ["Suro", "Sapar", "Mulud", "Bakda Mulud", "Jumadilawal", "Jumadilakir", "Rejeb", "Ruwah", "Pasa", "Sawal",
            "Dulkangidah", "Besar"
        ];
        const namaBulanHijriyah = ["Muharram", "Safar", "Rabiul Awal", "Rabiul Akhir", "Jumadil Awal", "Jumadil Akhir", "Rajab",
            "Sya'ban", "Ramadhan", "Syawal", "Dzulqa'dah", "Dzulhijjah"
        ];

        let currentStartMonth, currentYear;

        function masehiToHijriyah(year, month, day) {
            let jd = gregorianToJulian(year, month + 1, day);
            return julianToHijri(jd);
        }

        function gregorianToJulian(year, month, day) {
            if (month <= 2) { year -= 1;
                month += 12; }
            let a = Math.floor(year / 100);
            let b = 2 - a + Math.floor(a / 4);
            let jd = Math.floor(365.25 * (year + 4716)) + Math.floor(30.6001 * (month + 1)) + day + b - 1524.5;
            return Math.floor(jd);
        }

        function julianToHijri(jd) {
            const ISLAMIC_EPOCH = 1948439.5;
            function islamicToJd(year, month, day) {
                return day + Math.ceil(29.5 * (month - 1)) + (year - 1) * 354 +
                    Math.floor((3 + 11 * year) / 30) + ISLAMIC_EPOCH - 1;
            }
            let jdHalf = Math.floor(jd) + 0.5;
            let year = Math.floor((30 * (jdHalf - ISLAMIC_EPOCH) + 10646) / 10631);
            let month = Math.min(12, Math.ceil((jdHalf - (29 + islamicToJd(year, 1, 1))) / 29.5) + 1);
            let day = Math.round(jdHalf - islamicToJd(year, month, 1) + 1);
            return { year: year, month: month, day: day };
        }

        function getTahunJawa(year, month) {

            const hijri = masehiToHijriyah(year, month, 15);

            let jawaYear = hijri.year + 512;

            const siklus =
                ((jawaYear - 1555) % 8 + 8) % 8;

            return {
                tahun: jawaYear,
                nama: namaTahunJawa[siklus]
            };
        }

        function getWinduSancaya(year) {
            const winduNames = ["Adi", "Kuntara", "Sangara", "Sancaya"];
            const anchorYear = 1869;
            let diff = year - anchorYear;
            if (diff < 0) { let cycles = Math.floor(Math.abs(diff) / 32) + 1;
                diff += cycles * 32; }
            let winduIndex = Math.floor(diff / 8) % 4;
            let winduKe = Math.floor(diff / 8) + 1;
            let winduName = winduNames[winduIndex];
            let startYear = anchorYear + (winduKe - 1) * 8;
            let endYear = startYear + 7;
            return { nama: winduName, ke: winduKe, tahunMulai: startYear, tahunAkhir: endYear };
        }

        function getBulanSaka(year, month) {
            let hijri = masehiToHijriyah(year, month, 15);
            let jawaYear = getTahunJawa(year, month).tahun;
            let sakaMonth = hijri.month;
            return { year: jawaYear, month: sakaMonth, name: namaBulanSaka[sakaMonth - 1] || "-" };
        }

        function getBulanSakaPrev(year, month) {
            let hijri = masehiToHijriyah(year, month, 15);
            let prevMonth = hijri.month - 1;
            let prevYear = getTahunJawa(year, month).tahun;
            if (prevMonth < 1) { prevMonth = 12;
                prevYear -= 1; }
            return { name: namaBulanSaka[prevMonth - 1], month: prevMonth, year: prevYear };
        }

        function getBulanSakaNext(year, month) {
            let hijri = masehiToHijriyah(year, month, 15);
            let nextMonth = hijri.month + 1;
            let nextYear = getTahunJawa(year, month).tahun;
            if (nextMonth > 12) { nextMonth = 1;
                nextYear += 1; }
            return { name: namaBulanSaka[nextMonth - 1], month: nextMonth, year: nextYear };
        }

        function getBulanHijriyah(year, month) {

            const h1 = masehiToHijriyah(year, month, 1);
            const h2 = masehiToHijriyah(
                year,
                month,
                new Date(year, month + 1, 0).getDate()
            );

            return {
                name:
                    h1.month === h2.month
                    ? namaBulanHijriyah[h1.month - 1]
                    : namaBulanHijriyah[h1.month - 1] +
                      " / " +
                      namaBulanHijriyah[h2.month - 1],
                year: h1.year
            };
        }

        function getBulanHijriyahNext(year, month) {
            let hijri = masehiToHijriyah(year, month, 15);
            let nextMonth = hijri.month + 1;
            let nextYear = hijri.year;
            if (nextMonth > 12) { nextMonth = 1;
                nextYear += 1; }
            return { year: nextYear, month: nextMonth, name: namaBulanHijriyah[nextMonth - 1] || "-" };
        }

        function getEaster(year) {
            let a = year % 19,
                b = Math.floor(year / 100),
                c = year % 100;
            let d = Math.floor(b / 4),
                e = b % 4;
            let f = Math.floor((b + 8) / 25),
                g = Math.floor((b - f + 1) / 3);
            let h = (19 * a + b - d - g + 15) % 30;
            let i = Math.floor(c / 4),
                k = c % 4;
            let l = (32 + 2 * e + 2 * i - h - k) % 7;
            let m = Math.floor((a + 11 * h + 22 * l) / 451);
            let month = Math.floor((h + l - 7 * m + 114) / 31);
            let day = ((h + l - 7 * m + 114) % 31) + 1;
            return { day: day, month: month - 1 };
        }

            let holidays = [];
            let easter = getEaster(year);
            let easterDate = new Date(year, easter.month, easter.day);
            let goodFriday = new Date(easterDate);
            goodFriday.setDate(easterDate.getDate() - 2);

            return holidays;
        }

        // PATCH: patokan baru 1 November 2026 = Sinta
        function getWuku(year, month, day) {
            const baseDate = new Date(2026, 10, 1); // 1 November 2026
            const baseWukuIndex = 0;                // Sinta

            const targetDate = new Date(year, month, day);

            const diffDays = Math.floor(
                (targetDate - baseDate) / 86400000
            );

            let wukuIndex =
                (baseWukuIndex + Math.floor(diffDays / 7)) % 30;

            if (wukuIndex < 0) wukuIndex += 30;

            return daftarWuku[wukuIndex];
        }

        function getWukuForWeek(year, month, weekIndex) {
            const startDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            let firstDayOfWeek;
            if (weekIndex === 0) {
                firstDayOfWeek = 1;
            } else {
                const firstSunday = (startDay === 0) ? 1 : (8 - startDay);
                firstDayOfWeek = firstSunday + (weekIndex - 1) * 7;
            }

            let clampedFirstDay = firstDayOfWeek;
            if (clampedFirstDay > daysInMonth) clampedFirstDay = daysInMonth;
            const wukuMain = getWuku(year, month, clampedFirstDay);

            // PATCH: kolom minggu terakhir (index 4) bisa "menampung" 1-2 hari
            // titipan dari baris ke-6 pada bulan yang butuh 6 baris kalender
            // (lihat split-cell di getMonthData). Hari titipan itu selalu jatuh
            // di hari Minggu, yaitu awal wuku BARU, jadi labelnya perlu digabung
            // supaya tidak menampilkan wuku yang salah untuk hari-hari tsb.
            if (weekIndex === 4) {
                const totalCells = startDay + daysInMonth;
                if (totalCells > 35) {
                    const overflowFirstDay = firstDayOfWeek + 7;
                    if (overflowFirstDay <= daysInMonth) {
                        const wukuOverflow = getWuku(year, month, overflowFirstDay);
                        if (wukuOverflow.name !== wukuMain.name) {
                            return { name: wukuMain.name + ' / ' + wukuOverflow.name, split: true };
                        }
                    }
                }
            }

            return wukuMain;
        }

        function getPasaran(date) {
            const anchorDate = Date.UTC(1970, 0, 1);
            const targetDate = Date.UTC(
                date.getFullYear(),
                date.getMonth(),
                date.getDate()
            );

            const diffDays = Math.floor(
                (targetDate - anchorDate) / 86400000
            );

            const anchorPasaranIndex = 0; // Wage

            return pasaran[
                ((diffDays + anchorPasaranIndex) % 5 + 5) % 5
            ];
        }

                let endYear = (pm.nama === "Kapitu" && m === 0) ? year + 1 : year;
                let startDate = new Date(startYear, pm.sm, pm.sd);
                let endDate = new Date(endYear, pm.em, pm.ed);
                let monthStart = startDate.getMonth();
                let monthEnd = endDate.getMonth();
                let yearStart = startDate.getFullYear();
                let yearEnd = endDate.getFullYear();

                let isInRange = false;
                if (yearStart === yearEnd) {
                    if (m >= monthStart && m <= monthEnd) isInRange = true;
                } else {
                    if (m >= monthStart || m <= monthEnd) isInRange = true;
                }
                if (pm.nama === "Kapitu" && m === 11) isInRange = true;
                if (pm.nama === "Kapitu" && m === 0) isInRange = true;

                if (isInRange) {
                    let diffTime = Math.abs(endDate - startDate);
                    let diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
                    let startStr = `${pm.sd} ${namaBulan[pm.sm]} ${startYear}`;
                    let endStr = `${pm.ed} ${namaBulan[pm.em]} ${endYear}`;

                    ringkas += `<div class="mangsa-item">

        function getMonthData(year, month) {
            const data = { 0: [], 1: [], 2: [], 3: [], 4: [], 5: [], 6: [] };
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const startDay = new Date(year, month, 1).getDay();
            const prevDays = new Date(year, month, 0).getDate();

            for (let i = 0; i < startDay; i++) data[i][0] = { date: prevDays - startDay + i + 1, type: 'prev' };

            for (let d = 1; d <= daysInMonth; d++) {
                let dayOfWeek = (startDay + d - 1) % 7;
                let weekCol = Math.floor((d + startDay - 1) / 7);
                let currentDate = new Date(year, month, d);
                let p = getPasaran(currentDate);
                let isHolidayToday = isHoliday(year, month, d);
                let neptu = getNeptu(dayOfWeek, p);
                let pancasuda = getPancasuda(neptu);
                let hijri = masehiToHijriyah(year, month, d);
                let hijriStr = hijri.day + '/' + hijri.month;

                if (weekCol === 5) {
                    let hijriSplit = masehiToHijriyah(year, month, d);
                    data[dayOfWeek][4].split = {
                        date: d,
                        type: 'current',
                        pasaran: p,
                        isSunday: dayOfWeek === 0,
                        isHoliday: isHolidayToday,
                        neptu: neptu,
                        pancasuda: pancasuda,
                        hijri: hijriSplit.day + '/' + hijriSplit.month
                    };
                } else {
                    data[dayOfWeek][weekCol] = {
                        date: d,
                        type: 'current',
                        pasaran: p,
                        isSunday: dayOfWeek === 0,
                        isHoliday: isHolidayToday,
                        neptu: neptu,
                        pancasuda: pancasuda,
                        hijri: hijriStr
                    };
                }
            }

            let nextD = 1;
            for (let dow = 0; dow <= 6; dow++) {
                for (let w = 0; w <= 4; w++) {
                    if (!data[dow][w]) data[dow][w] = { date: nextD++, type: 'next' };
                }
            }
            return data;
        }

                let bottomClasses = cellData.split.isSunday || cellData.split.isHoliday ? "red-text" : "";
                let topHijri = cellData.hijri || "";

                let topPc = cellData.pancasuda || getPancasuda(cellData.neptu);

        function computeMaxFooterHeight(year) {
            const wrapper = document.getElementById('calendarWrapper');

                const fEl = probe.querySelector('.footer');

                if (h > maxH) maxH = h;
            }

            document.body.removeChild(probe);

        function applyFixedFooterHeight(year) {

                        <div class="header-right">
                            <div class="month-title-btn" onclick="nextMonth()" title="Bulan Selanjutnya" style="flex-direction: row-reverse;">
                                ${namaBulan[m2]}
                                <span class="nav-arrow">&#9654;</span>
                            </div>
                            <div class="month-info-right">
                                <div class="line1">${saka2.name.toUpperCase()} - ${saka2Next.name.toUpperCase()}</div>
                                <div class="line2">${hijri2.name.toUpperCase()} - ${hijri2Next.name.toUpperCase()} ${hijri2.year} HIJRIYAH</div>
                                <div class="line3"><span class="tahun-jawa">${tahunJawa2.tahun} ${tahunJawa2.nama.toUpperCase()}</span></div>
                            </div>
                        </div>
                    </div>

                    <div class="calendar-grid">
                        <div class="wuku-row">
                            ${wukuM1.map(w => `<div class="wuku-cell${w.split ? ' wuku-split' : ''}">${w.name.toUpperCase()}</div>`).join('')}
                            <div class="wuku-cell wuku-center">WUKU</div>
                            ${wukuM2.map(w => `<div class="wuku-cell${w.split ? ' wuku-split' : ''}">${w.name.toUpperCase()}</div>`).join('')}
                        </div>
                `;

            const dayNames = ["MINGGU", "SENIN", "SELASA", "RABU", "KAMIS", "JUMAT", "SABTU"];
            for (let row = 0; row < 7; row++) {
                for (let col = 0; col < 5; col++) {
                    let cellData = dataM1[row] && dataM1[row][col] ? dataM1[row][col] : null;
                    html += renderCell(cellData);
                }
                let dayClass = row === 0 ? "day-minggu" : "";
                let onclickAttr = row === 0 ? `onclick="openDatePicker()"` : "";
                if (row === 6) {
                    html +=
                        `<div class="day-name ${dayClass}" onclick="exportPDF()" id="sabtBtn" title="Klik untuk Download PDF" style="cursor:pointer;">SABTU</div>`;
                } else {
                    html += `<div class="day-name ${dayClass}" ${onclickAttr}>${dayNames[row]}</div>`;
                }
                for (let col = 0; col < 5; col++) {
                    let cellData = dataM2[row] && dataM2[row][col] ? dataM2[row][col] : null;
                    html += renderCell(cellData);
                }
            }

            html += `</div>`;

            let holidays1 = getHolidaysInfo(m1, y1);
            let holidays2 = getHolidaysInfo(m2, y2);
            let mangsa = getMangsaInfo(m1, y1);

            html += `
                    <div class="footer">
                        <div class="footer-grid">
                            <div class="footer-col">
                                <strong>LIBUR NASIONAL</strong><br>
                                ${holidays1 || '<span style="color:#999;">Tidak ada</span>'}
                            </div>
                            <div class="footer-col center">
                                <strong>PRANATA MONGSO</strong><br>
                                ${mangsa.ringkas}
                            </div>
                            <div class="footer-col center">
                                <strong>Cuaca &amp; Angin</strong><br>
                                ${mangsa.cuaca}
                            </div>
                            <div class="footer-col center">
                                <strong>Dampak &amp; Kejadian</strong><br>
                                ${mangsa.dampak}
                            </div>
                            <div class="footer-col" style="text-align: right;">
                                <strong>LIBUR NASIONAL</strong><br>
                                ${holidays2 || '<span style="color:#999;">Tidak ada</span>'}
                            </div>
                        </div>
                    </div>
                `;

            document.getElementById('calendarWrapper').innerHTML = html;
            applyFixedFooterHeight(y1);
            requestAnimationFrame(() => { if (typeof enforceRatio === 'function') enforceRatio(); });
        }

        // --- FUNGSI EXPORT PDF ---
        function exportPDF() {
            const element = document.getElementById('calendarWrapper');

            const m2 = (currentStartMonth + 1) % 12;
            const y2 = currentStartMonth === 11 ? currentYear + 1 : currentYear;
            const filename = `Kalender-Jawa-${namaBulan[currentStartMonth]}-${namaBulan[m2]}-${currentYear}.pdf`;

            const pageW_mm = 280;
            const pageH_mm = 180;
            const margin_mm = 5;
            const availW_mm = pageW_mm - margin_mm * 2;
            const availH_mm = pageH_mm - margin_mm * 2;

            const calWidth = 1000;

            const prevWidth = element.style.width;
            const prevOverflow = element.style.overflow;
            const prevShadow = element.style.boxShadow;
            element.style.width = calWidth + 'px';
            element.style.overflow = 'visible';
            element.style.boxShadow = 'none';

            requestAnimationFrame(() => {
                const calHeight = element.getBoundingClientRect().height || element.offsetHeight || 700;

                html2canvas(element, {
                    scale: 3,
                    useCORS: true,
                    allowTaint: true,
                    letterRendering: true,
                    logging: false,
                    backgroundColor: '#ffffff',
                    width: calWidth,
                    height: Math.ceil(calHeight),
                    scrollX: 0,
                    scrollY: -window.scrollY,
                    windowWidth: calWidth,
                    onclone: function(clonedDoc) {
                        const el = clonedDoc.getElementById('calendarWrapper');
                        if (el) {
                            el.style.boxShadow = 'none';
                            el.style.border = 'none';
                            el.style.width = calWidth + 'px';
                            el.style.overflow = 'visible';
                            el.style.height = 'auto';
                        }
                        clonedDoc.body.style.overflow = 'visible';
                        clonedDoc.body.style.height = 'auto';
                        const link = clonedDoc.createElement('link');
                        link.rel = 'stylesheet';
                        link.href =
                            'https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@400;700&display=swap';
                        clonedDoc.head.appendChild(link);
                    }
                }).then(function(canvas) {
                    element.style.width = prevWidth;
                    element.style.overflow = prevOverflow;
                    element.style.boxShadow = prevShadow;

                    const canvasW = canvas.width;
                    const canvasH = canvas.height;

                    const fitScale = Math.min(availW_mm / canvasW, availH_mm / canvasH);
                    const imgW_mm = canvasW * fitScale;
                    const imgH_mm = canvasH * fitScale;
                    const offsetX = (pageW_mm - imgW_mm) / 2;
                    const offsetY = (pageH_mm - imgH_mm) / 2;

                    const imgData = canvas.toDataURL('image/jpeg', 0.98);

                    const pdf = new window.jspdf.jsPDF({
                        unit: 'mm',
                        format: [pageW_mm, pageH_mm],
                        orientation: 'landscape',
                        compress: true
                    });

                    pdf.addImage(imgData, 'JPEG', offsetX, offsetY, imgW_mm, imgH_mm);
                    pdf.save(filename);

                }).catch(function(err) {
                    element.style.width = prevWidth;
                    element.style.overflow = prevOverflow;
                    element.style.boxShadow = prevShadow;
                    console.error('PDF Error:', err);
                    alert('Gagal membuat PDF.\nCoba gunakan Ctrl+P → Save as PDF sebagai alternatif.');
                });
            });
        }

        function nextMonth() {
            currentStartMonth += 2;
            if (currentStartMonth > 11) { currentStartMonth -= 12;
                currentYear++; }
            generateCalendar();
        }

        function prevMonth() {
            currentStartMonth -= 2;
            if (currentStartMonth < 0) { currentStartMonth += 12;
                currentYear--; }
            generateCalendar();
        }

        // --- INISIALISASI ---
        function initCalendar() {
            const today = new Date();
            const todayMonth = today.getMonth();
            currentStartMonth = (todayMonth % 2 === 0) ? todayMonth : todayMonth - 1;
            if (currentStartMonth < 0) currentStartMonth = 0;
            currentYear = today.getFullYear();
            generateCalendar();
        }

        // --- ENFORCE RATIO ---
        function enforceRatio() {
            const wrapper = document.getElementById('calendarWrapper');
            if (!wrapper) return;

            const W = wrapper.offsetWidth;
            const targetH = Math.round(W * (180 / 280));

            const header = wrapper.querySelector('.header');
            const wukuRow = wrapper.querySelector('.wuku-row');
            const footer = wrapper.querySelector('.footer');
            const headerH = header ? header.offsetHeight : 85;
            const wukuH = wukuRow ? wukuRow.offsetHeight : 18;
            const footerH = footer ? footer.offsetHeight : 55;

            const cellTotalH = targetH - headerH - wukuH - footerH - 4;
            const cellH = Math.floor(cellTotalH / 7);

            const style = document.getElementById('dynamicCellStyle') || document.createElement('style');
            style.id = 'dynamicCellStyle';
            style.textContent = `.date-cell { height: ${cellH}px !important; }`;
            document.head.appendChild(style);
        }

        // Jalankan
        initCalendar();
        document.fonts.ready.then(() => { enforceRatio(); });
    </script>

</body>
